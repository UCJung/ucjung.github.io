theme: jekyll-theme-chirpy

lang: ko-KR
timezone: Asia/Seoul

title: UC Jung Tech Blog
tagline: "R&D · AI Agent · Healthcare IT"
description: >-
  AI Agent 파이프라인, Healthcare IT 해외진출, 
  R&D 프로젝트 개발 경험을 기록하는 기술 블로그

url: "https://ucjung.github.io"
baseurl: ""

github:
  username: UCJung

twitter:
  username: ""

social:
  name: UC Jung
  email: mykumi@gmail.com
  links:
    - https://github.com/UCJung

webmaster_verifications:
  google: ""

theme_mode: ""
avatar: "/assets/img/profile.svg"
toc: true
cdn: ""

comments:
  provider: giscus
  giscus:
    repo: UCJung/UCJung.github.io
    repo_id: "" # giscus.app에서 발급
    category: "Announcements"
    category_id: "" # giscus.app에서 발급
    mapping: pathname
    strict: 0
    input_position: bottom
    reactions_enabled: 1
    theme: preferred_color_scheme
    crossorigin: anonymous
    lang: ko

analytics:
  google:
    id: "" # GA4 측정 ID

pwa:
  enabled: true
  cache:
    enabled: true

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

sass:
  style: compressed

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      math: false
      mermaid: false
      permalink: /posts/:title/
  - scope:
      path: "_tabs"
      type: tabs
    values:
      layout: page
      permalink: /:title/

paginate: 10

collections:
  tabs:
    output: true
    sort_by: order

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json
